[General]
SnapThreshold=16
MinWidth=120
MinHeight=80
EnableEdgeSnap=true
EnableAeroSnap=true
AeroThreshold=8
WatchdogMs=250

[Safety]
EmergencyExit=true
FinishOnAltRelease=true
SuppressAltMenu=false

[Blacklist]
; Comma-separated wildcard patterns.
; Classes match Win32 window class names.
Classes=Progman,WorkerW,Shell_TrayWnd,Shell_SecondaryTrayWnd,Button,#32768,TaskSwitcherWnd,TaskSwitcherOverlayWnd,MultitaskingViewFrame,NotifyIconOverflowWindow

; Processes match executable names.
Processes=StartMenuExperienceHost.exe,SearchApp.exe,TextInputHost.exe,ShellExperienceHost.exe,dwm.exe

; Titles match window titles.
Titles=Program Manager
