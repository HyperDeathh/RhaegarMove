[General]
SnapThreshold=16
MinWidth=120
MinHeight=80
MaxWidth=0
MaxHeight=0
WatchdogMs=250
EnableEdgeSnap=true
EnableAeroSnap=true
AeroThreshold=8
AeroMaxSpeed=65535
AeroSpeedTau=64
AeroTopMaximizes=true
AutoSnap=2
SnapToWindows=true
SnapGap=0
StickyResize=false
EnableRuleDiagnostics=false
EnableSnapDiagnostics=false
EnablePreviewState=false
EnablePreviewOverlay=false
EnablePreviewOnlySnap=false
ResizeCenterMode=1
CenterFraction=24
SidesFraction=24
AllowFullScreenWindows=false
SkipMaximizedWindows=false
NotifyMoveSizeEvents=true

[Safety]
EmergencyExit=true
FinishOnAltRelease=true
SuppressAltMenu=false

[Blacklist]
Classes=Progman,WorkerW,Shell_TrayWnd,Shell_SecondaryTrayWnd,Button,#32768,TaskSwitcherWnd,TaskSwitcherOverlayWnd,MultitaskingViewFrame,NotifyIconOverflowWindow,XamlExplorerHostIslandWindow,Windows.UI.Core.CoreWindow,NativeHWNDHost,Xaml_WindowedPopupClass,TaskListThumbnailWnd
Processes=StartMenuExperienceHost.exe,SearchApp.exe,TextInputHost.exe,ShellExperienceHost.exe,dwm.exe,mstsc.exe,msrdc.exe,osk.exe
Titles=Program Manager,Volume Control
Rules=ApplicationFrameHost.exe:*|Windows.UI.Core.CoreWindow,*:*|Xaml_WindowedPopupClass
SnapList=
NoSizingNotify=
NoResize=
