[General]
SnapThreshold=16
MinWidth=120
MinHeight=80
WatchdogMs=250

EnableEdgeSnap=true
EnableAeroSnap=true
AeroThreshold=8
AeroMaxSpeed=65535
AeroSpeedTau=64
AeroTopMaximizes=true

; AutoSnap:
; 0 = disabled
; 1 = monitor work-area edges only
; 2 = monitor edges + outside of other windows
; 3 = monitor edges + outside/inside of other windows
AutoSnap=2
SnapToWindows=true
SnapGap=0

; ResizeCenterMode:
; 0 = side regions only, fallback to quadrant
; 1 = symmetric center resize
; 2 = move when resizing from center
; 3 = closest side fallback
ResizeCenterMode=1
CenterFraction=24
SidesFraction=24

AllowFullscreenWindows=false
IgnoreMaximizedWindows=false
NotifyMoveSizeEvents=true

[Safety]
EmergencyExit=true
FinishOnAltRelease=true
SuppressAltMenu=false

[Blacklist]
; Comma-separated wildcard patterns.
; Classes match Win32 window class names.
Classes=Progman,WorkerW,Shell_TrayWnd,Shell_SecondaryTrayWnd,Button,#32768,TaskSwitcherWnd,TaskSwitcherOverlayWnd,MultitaskingViewFrame,NotifyIconOverflowWindow,XamlExplorerHostIslandWindow,Windows.UI.Core.CoreWindow,NativeHWNDHost,Xaml_WindowedPopupClass,TaskListThumbnailWnd

; Processes match executable names.
Processes=StartMenuExperienceHost.exe,SearchApp.exe,TextInputHost.exe,ShellExperienceHost.exe,dwm.exe,mstsc.exe,msrdc.exe,osk.exe

; Titles match window titles.
Titles=Program Manager,Volume Control
