name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build RhaegarMove
        shell: cmd
        run: build.bat

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: RhaegarMove-windows-x64
          path: |
            dist/RhaegarMove.exe
            RhaegarMove.ini
            install.bat
            uninstall.bat
            stop.bat
            status.bat
            open_config.bat
            settings.bat
            diagnose_cursor.bat
            preview_status.bat
            reload.bat
            request_exit.bat
            snap_targets.bat
            snap_score.bat
            minmax_report.bat
            dpi_snap_report.bat
            config_report.bat
          if-no-files-found: error
